<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Positions</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07080f; --surface: #0d0f1c; --card: #111425;
    --border: #1c1f35; --border2: #252840;
    --red: #e10600; --text: #d8daf0; --muted: #42455e; --label: #6b6e8a;
  }
  html, body, #root { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 14px;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #root { position: relative; z-index: 1; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp .4s ease both; }
</style>
</head>
<body>
<div id="root"></div>
{% raw %}
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const PALETTE = [
  "#00d2be","#e10600","#ff8700","#0090ff","#ffffff",
  "#dc0000","#006f62","#2b4562","#b6babd","#f596c8",
  "#37bedd","#a5c0dd","#3671c6","#0082fa","#ff87bc",
  "#c92d4b","#6cd3bf","#e8002d","#52e252","#b3c7c7",
  "#fe86bc","#ff3300",
];
const MARGIN  = { top: 20, right: 90, bottom: 40, left: 60 };
const ROW_H   = 32;
const col     = i => PALETTE[i % PALETTE.length];
const abbr3   = n => (n || '?').split(' ').pop().substring(0, 3).toUpperCase();

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
const Tooltip = ({ lap, rows, x, y, visible }) => {
  if (!visible || !rows.length) return null;
  return (
    <div style={{
      position:'fixed', left:x+16, top:y-20,
      background:'rgba(7,8,15,0.97)', border:'1px solid #1c1f35',
      borderRadius:8, padding:'10px 14px', pointerEvents:'none', zIndex:9999,
      minWidth:170, boxShadow:'0 12px 40px rgba(0,0,0,.7)',
      fontFamily:"'Rajdhani',sans-serif",
    }}>
      <div style={{ fontFamily:"'Orbitron',monospace", fontSize:10, color:'#6b6e8a', letterSpacing:2, marginBottom:8, textTransform:'uppercase' }}>
        Volta {lap}
      </div>
      {rows.map((r,i) => (
        <div key={i} style={{ display:'flex', alignItems:'center', gap:8, marginBottom: i<rows.length-1?5:0 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:r.color, boxShadow:`0 0 6px ${r.color}`, flexShrink:0 }}/>
          <span style={{ flex:1, fontWeight:700, fontSize:13 }}>{r.nome}</span>
          <span style={{ fontFamily:"'Orbitron',monospace", fontSize:12, fontWeight:700, color:r.color }}>P{r.pos}</span>
        </div>
      ))}
    </div>
  );
};

// ── STATS PANEL ──────────────────────────────────────────────────────────────
const StatsPanel = ({ pilotos, ultrapassagens, hidden, onToggle }) => {
  const stats = useMemo(() =>
    pilotos.map((p, i) => {
      const voltas   = Object.keys(p.posicoes).map(Number).sort((a,b)=>a-b);
      const posStart = voltas.length ? p.posicoes[voltas[0]]               : null;
      const posEnd   = p.pos_final || (voltas.length ? p.posicoes[voltas[voltas.length-1]] : null);
      const ganhou   = posStart && posEnd ? posStart - posEnd : 0;
      return {
        ...p, i, posStart, posEnd, ganhou,
        fez:  ultrapassagens.filter(e => e.ultrapassou_nome  === p.nome).length,
        levou:ultrapassagens.filter(e => e.ultrapassado_nome === p.nome).length,
      };
    }).sort((a,b) => (a.posEnd||99)-(b.posEnd||99))
  , [pilotos, ultrapassagens]);

  const Th = ({ children, center }) => (
    <div style={{ fontSize:10, fontWeight:700, letterSpacing:2, color:'var(--label)', textTransform:'uppercase', textAlign: center?'center':'left' }}>
      {children}
    </div>
  );

  const grid = '28px 1fr 60px 70px 54px 54px 54px';

  return (
    <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden' }}>
      <div style={{ display:'grid', gridTemplateColumns:grid, gap:8, padding:'8px 16px', background:'var(--surface)', borderBottom:'1px solid var(--border)' }}>
        <Th/><Th>Piloto</Th><Th center>Grid</Th><Th center>Final</Th><Th center>+/−</Th><Th center>↑</Th><Th center>↓</Th>
      </div>
      {stats.map(p => {
        const isHidden = hidden.has(p.i);
        const gc = p.ganhou>0?'#00e87a':p.ganhou<0?'#e10600':'var(--label)';
        return (
          <div
            key={p.nome}
            onClick={() => onToggle(p.i)}
            style={{ display:'grid', gridTemplateColumns:grid, gap:8, padding:'9px 16px', cursor:'pointer', opacity:isHidden?.3:1, transition:'opacity .2s,background .2s', borderBottom:'1px solid var(--border)', alignItems:'center' }}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.03)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}
          >
            <div style={{ width:4, height:28, borderRadius:2, background:col(p.i), boxShadow:`0 0 8px ${col(p.i)}66` }}/>
            <div style={{ fontWeight:700, fontSize:13 }}>{p.nome}</div>
            <div style={{ textAlign:'center', color:'var(--label)', fontFamily:"'Orbitron',monospace", fontSize:11 }}>{p.posStart?`P${p.posStart}`:'—'}</div>
            <div style={{ textAlign:'center', fontFamily:"'Orbitron',monospace", fontSize:12, fontWeight:700, color:col(p.i) }}>{p.posEnd?`P${p.posEnd}`:'—'}</div>
            <div style={{ textAlign:'center', fontWeight:700, fontSize:13, color:gc }}>{p.ganhou>0?`+${p.ganhou}`:p.ganhou<0?`${p.ganhou}`:'—'}</div>
            <div style={{ textAlign:'center', color:'#00e87a', fontWeight:700 }}>{p.fez||'—'}</div>
            <div style={{ textAlign:'center', color:'#e10600', fontWeight:700 }}>{p.levou||'—'}</div>
          </div>
        );
      })}
    </div>
  );
};

// ── CANVAS CHART ─────────────────────────────────────────────────────────────
const RaceChart = ({ data, hidden, onMouseMove, onMouseLeave, containerW }) => {
  const canvasRef = useRef(null);
  const { pilotos=[], max_volta:maxVolta=1, ultrapassagens=[] } = data;
  const nDrivers = pilotos.length;
  const H = MARGIN.top + nDrivers * ROW_H + MARGIN.bottom;
  // Preenche o container inteiro; mínimo de 900px
  const W = Math.max(900, containerW || 900);

  // volta 0 = posição de grid (antes da largada), plota no extremo esquerdo
  const xScale = useCallback(v => v === 0 ? MARGIN.left : MARGIN.left + ((v-1)/Math.max(maxVolta-1,1))*(W-MARGIN.left-MARGIN.right), [maxVolta,W]);
  const yScale = useCallback(p => MARGIN.top  + ((p-1)/(nDrivers-1||1))*(H-MARGIN.top-MARGIN.bottom), [nDrivers,H]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.scale(dpr, dpr);
    ctx.clearRect(0,0,W,H);

    const plotW = W-MARGIN.left-MARGIN.right;
    const plotH = H-MARGIN.top-MARGIN.bottom;

    // stripes
    for (let p=1;p<=nDrivers;p++) {
      const y = yScale(p);
      ctx.fillStyle = p%2===0?'#0d0f1c':'#0a0c18';
      ctx.fillRect(MARGIN.left, y-ROW_H/2, plotW, ROW_H);
    }
    // vertical grid
    ctx.strokeStyle='#181b2e'; ctx.lineWidth=1;
    for (let v=1;v<=maxVolta;v++) {
      if (v%5===0||v===1||v===maxVolta) {
        const x=xScale(v);
        ctx.beginPath(); ctx.moveTo(x,MARGIN.top-4); ctx.lineTo(x,MARGIN.top+plotH); ctx.stroke();
      }
    }
    // Y labels
    ctx.fillStyle='#42455e'; ctx.font="700 10px 'Rajdhani',sans-serif";
    ctx.textAlign='right'; ctx.textBaseline='middle';
    for (let p=1;p<=nDrivers;p++) ctx.fillText(`P${p}`,MARGIN.left-8,yScale(p));
    // X labels
    ctx.fillStyle='#42455e'; ctx.font="10px 'Rajdhani',sans-serif";
    ctx.textAlign='center'; ctx.textBaseline='top';
    for (let v=1;v<=maxVolta;v++) {
      if (v===1||v%5===0||v===maxVolta) ctx.fillText(v,xScale(v),MARGIN.top+plotH+8);
    }

    // driver lines
    pilotos.forEach((p,idx) => {
      if (hidden.has(idx)) return;
      const c = col(idx);
      const vs = Object.keys(p.posicoes).map(Number).sort((a,b)=>a-b);
      if (!vs.length) return;

      ctx.save();
      ctx.strokeStyle=c; ctx.lineWidth=2.5;
      ctx.shadowColor=c; ctx.shadowBlur=5;
      ctx.setLineDash([]);
      ctx.beginPath();
      let started=false;
      for (const v of vs) {
        if (v === 0) continue;  // volta 0 é só marcador de grid
        const pos=p.posicoes[v];
        if (!pos||pos<1) continue;
        const x=xScale(v), y=yScale(pos);
        if (!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);
      }
      ctx.stroke(); ctx.restore();

      // dots (pula volta 0 que é o marcador de grid)
      for (const v of vs) {
        if (v === 0) continue;
        const pos=p.posicoes[v]; if (!pos||pos<1) continue;
        const x=xScale(v),y=yScale(pos),r=(v%5===0||v===1||v===maxVolta)?4:2.5;
        ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }

      // grid marker — volta 0 = posição de largada
      const gridPos = p.posicoes[0];
      if (gridPos && gridPos >= 1) {
        const gx = MARGIN.left;
        const gy = yScale(gridPos);

        // linha tracejada do grid até a volta 1
        const lap1pos = p.posicoes[1];
        if (lap1pos && lap1pos >= 1) {
          const lx = xScale(1), ly = yScale(lap1pos);
          ctx.save();
          ctx.strokeStyle = c; ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 4]); ctx.globalAlpha = 0.6;
          ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(lx, ly); ctx.stroke();
          ctx.restore();
        }

        // círculo hollow
        ctx.strokeStyle = c; ctx.fillStyle = '#07080f'; ctx.lineWidth = 2.5;
        ctx.shadowColor = c; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(gx, gy, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // end label — mostra posição FINAL (não a de largada)
      const lastRealV = vs.filter(v => v > 0).pop();
      const lastP = lastRealV ? p.posicoes[lastRealV] : null;
      if (lastP && lastP >= 1) {
        const x = xScale(lastRealV) + 9;
        // posiciona o label na linha Y da posição final real
        const labelY = p.pos_final ? yScale(p.pos_final) : yScale(lastP);
        ctx.fillStyle = c; ctx.font = "700 11px 'Rajdhani',sans-serif";
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.shadowColor = c; ctx.shadowBlur = 6;
        ctx.fillText(`${abbr3(p.nome)} P${p.pos_final || lastP}`, x, labelY);
        ctx.shadowBlur = 0;
      }
    });
    ctx.setLineDash([]);

    // overtake arrows
    ultrapassagens.forEach(ev => {
      if (!ev.volta||!ev.ultrapassou_nome||!ev.pos_ultrapassou) return;
      const idxA=pilotos.findIndex(p=>p.nome===ev.ultrapassou_nome);
      if (idxA<0||hidden.has(idxA)) return;
      const x=xScale(ev.volta), y=yScale(ev.pos_ultrapassou), c=col(idxA);
      ctx.save(); ctx.translate(x,y-14);
      ctx.fillStyle=c; ctx.strokeStyle='#07080f'; ctx.lineWidth=1.5;
      ctx.shadowColor=c; ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.moveTo(0,-7); ctx.lineTo(5,0); ctx.lineTo(2.5,0);
      ctx.lineTo(2.5,6); ctx.lineTo(-2.5,6); ctx.lineTo(-2.5,0); ctx.lineTo(-5,0);
      ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
    });

  }, [data, hidden, xScale, yScale, W, H, nDrivers, maxVolta, pilotos, ultrapassagens]);

  const handleMouseMove = useCallback(e => {
    const canvas=canvasRef.current; if (!canvas) return;
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const xNorm=(mx-MARGIN.left)/(W-MARGIN.left-MARGIN.right);
    const lap=Math.round(1+xNorm*(maxVolta-1));
    if (lap<1||lap>maxVolta){onMouseLeave();return;}
    const rows=pilotos
      .map((p,i)=>({nome:p.nome,pos:p.posicoes[lap],color:col(i),i}))
      .filter(r=>r.pos&&!hidden.has(r.i)).sort((a,b)=>a.pos-b.pos);
    onMouseMove({lap,rows,clientX:e.clientX,clientY:e.clientY});
  }, [W, maxVolta, pilotos, hidden, onMouseMove, onMouseLeave]);

  return (
    <div style={{ overflow:'hidden' }}>
      <canvas ref={canvasRef} style={{ display:'block', cursor:'crosshair' }}
        onMouseMove={handleMouseMove} onMouseLeave={onMouseLeave}/>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const App = () => {
  const [sessions, setSessions] = useState([]);
  const [sessId,   setSessId]   = useState(null);
  const [data,     setData]     = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState(null);
  const [hidden,   setHidden]   = useState(new Set());
  const [tooltip,  setTooltip]  = useState({visible:false,lap:0,rows:[],x:0,y:0});
  const [tab,      setTab]      = useState('chart');
  const [chartW,   setChartW]   = useState(900);
  const containerRef = useRef(null);

  useEffect(() => {
    fetch('/historico_sessoes').then(r=>r.json()).then(arr=>{
      const list=Array.isArray(arr)?arr:(arr.sessoes||[]);
      setSessions(list);
      if (list.length>0) setSessId(list[0].id);
    }).catch(()=>setError('Erro ao carregar sessões'));
  }, []);

  useEffect(() => {
    if (!sessId) return;
    setLoading(true); setData(null); setError(null); setHidden(new Set());
    Promise.all([
      fetch(`/api/race_positions/${sessId}`).then(r=>r.json()),
      fetch(`/api/race_positions/${sessId}/ultrapassagens`).then(r=>r.json()),
    ]).then(([d,ul])=>{
      setData({...d, ultrapassagens:Array.isArray(ul)?ul:[]});
      setLoading(false);
    }).catch(()=>{setError('Erro ao carregar dados');setLoading(false);});
  }, [sessId]);

  // Observa largura do container para o canvas preencher tudo
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const ro = new ResizeObserver(entries => {
      const w = entries[0].contentRect.width;
      if (w > 0) setChartW(w - 4);
    });
    ro.observe(el);
    // leitura inicial
    setChartW(el.offsetWidth - 4);
    return () => ro.disconnect();
  }, []);

  const toggleDriver = useCallback(idx => {
    setHidden(prev=>{ const n=new Set(prev); n.has(idx)?n.delete(idx):n.add(idx); return n; });
  }, []);

  const sessInfo = sessions.find(s=>s.id===sessId);
  const pilotos  = data?.pilotos||[];
  const ultra    = data?.ultrapassagens||[];

  const BtnStyle = (active) => ({
    padding:'7px 16px', borderRadius:6, cursor:'pointer',
    fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:12,
    letterSpacing:1, textTransform:'uppercase', border:'none',
    background: active?'var(--red)':'var(--card)',
    color: active?'#fff':'var(--label)', transition:'all .2s',
  });

  return (
    <div style={{ maxWidth:1640, margin:'0 auto', padding:20 }}>

      {/* HEADER */}
      <div style={{ display:'flex', alignItems:'center', gap:16, padding:'14px 20px', background:'var(--surface)', border:'1px solid var(--border)', borderTop:'3px solid var(--red)', borderRadius:'0 0 10px 10px', marginBottom:16 }}>
        <div>
          <div style={{ fontFamily:"'Orbitron',monospace", fontSize:16, fontWeight:900, letterSpacing:4, textTransform:'uppercase' }}>Race Positions</div>
          <div style={{ fontSize:12, color:'var(--label)', marginTop:2, letterSpacing:1 }}>
            {sessInfo ? `${sessInfo.nome_pista||'?'} · ${sessInfo.tipo_sessao||'?'} · ${data?.max_volta||'?'} voltas` : '—'}
          </div>
        </div>

        {ultra.length>0 && (
          <div style={{ marginLeft:12, background:'rgba(225,6,0,.12)', border:'1px solid rgba(225,6,0,.3)', borderRadius:6, padding:'4px 12px', fontSize:12, fontWeight:700, color:'#e10600', letterSpacing:1 }}>
            {ultra.length} ultrapassagens
          </div>
        )}

        <div style={{ marginLeft:'auto', display:'flex', gap:10, alignItems:'center' }}>
          <select value={sessId||''} onChange={e=>setSessId(Number(e.target.value))} style={{ background:'#0d0f1c', color:'var(--text)', border:'1px solid var(--border2)', borderRadius:6, padding:'7px 12px', fontFamily:"'Rajdhani',sans-serif", fontSize:13, fontWeight:600, cursor:'pointer', outline:'none', minWidth:260 }}>
            {sessions.map(s=>(
              <option key={s.id} value={s.id}>#{s.id} — {s.nome_pista||'?'} ({s.tipo_sessao||'?'})</option>
            ))}
          </select>
          <button onClick={()=>setTab('chart')} style={BtnStyle(tab==='chart')}>Gráfico</button>
          <button onClick={()=>setTab('stats')} style={BtnStyle(tab==='stats')}>Stats</button>
        </div>
      </div>

      {/* LOADING */}
      {loading && (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'50vh', gap:14 }}>
          <div style={{ width:36, height:36, border:'3px solid var(--border)', borderTopColor:'var(--red)', borderRadius:'50%', animation:'spin .7s linear infinite' }}/>
          <div style={{ fontSize:11, color:'var(--muted)', letterSpacing:3, textTransform:'uppercase' }}>Carregando posições...</div>
        </div>
      )}

      {!loading && error && (
        <div style={{ textAlign:'center', padding:'80px 20px', color:'var(--muted)' }}>
          <div style={{ fontFamily:"'Orbitron',monospace", fontSize:16, color:'var(--border2)', marginBottom:8 }}>{error}</div>
        </div>
      )}

      {!loading && !error && data && pilotos.length===0 && (
        <div style={{ textAlign:'center', padding:'80px 20px', color:'var(--muted)' }}>
          <div style={{ fontFamily:"'Orbitron',monospace", fontSize:16, color:'var(--border2)', marginBottom:8 }}>Sem dados de posição</div>
          <p style={{ fontSize:13 }}>As voltas desta sessão não têm posição por volta registrada.</p>
        </div>
      )}

      {/* CHART TAB */}
      {!loading && !error && data && pilotos.length>0 && tab==='chart' && (
        <div className="fade-in">
          <div ref={containerRef} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'20px 16px 12px 0', overflow:'hidden' }}>
            <RaceChart
              data={data} hidden={hidden} containerW={chartW}
              onMouseMove={({lap,rows,clientX,clientY})=>setTooltip({visible:true,lap,rows,x:clientX,y:clientY})}
              onMouseLeave={()=>setTooltip(t=>({...t,visible:false}))}
            />
          </div>
          {/* legend */}
          <div style={{ display:'flex', flexWrap:'wrap', gap:'8px 18px', marginTop:14, padding:'0 4px' }}>
            {pilotos.map((p,i)=>(
              <div key={p.nome} onClick={()=>toggleDriver(i)}
                style={{ display:'flex', alignItems:'center', gap:8, fontSize:12, fontWeight:600, cursor:'pointer', opacity:hidden.has(i)?.3:1, transition:'opacity .2s', padding:'4px 8px', borderRadius:4 }}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >
                <div style={{ width:24, height:3, borderRadius:2, background:col(i), boxShadow:`0 0 6px ${col(i)}88` }}/>
                <span>{p.nome}</span>
                <span style={{ background:'rgba(255,255,255,.07)', borderRadius:3, padding:'1px 5px', fontSize:10, color:'var(--label)' }}>#{p.numero||'?'}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* STATS TAB */}
      {!loading && !error && data && pilotos.length>0 && tab==='stats' && (
        <div className="fade-in">
          <div style={{ display:'flex', gap:20, marginBottom:12, fontSize:12, color:'var(--label)', alignItems:'center' }}>
            <span>Clique para esconder/mostrar no gráfico</span>
            <span style={{ marginLeft:'auto' }}>↑ ultrapassagens feitas &nbsp;·&nbsp; ↓ vezes ultrapassado</span>
          </div>
          <StatsPanel pilotos={pilotos} ultrapassagens={ultra} hidden={hidden} onToggle={toggleDriver}/>
        </div>
      )}

      <Tooltip {...tooltip}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
{% endraw %}
</body>
</html>
