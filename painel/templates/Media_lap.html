<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Voltas - GP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #root { min-height: 100vh; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 2s linear infinite; }
    </style>
</head>
<body class="bg-gray-200">
    <div id="root">
        <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a2e; color: white;">
            <div style="text-align: center;">
                <div style="font-size: 4rem; margin-bottom: 1rem;" class="animate-spin">⏳</div>
                <h2 style="font-size: 2rem; font-weight: bold;">Carregando...</h2>
            </div>
        </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    {% raw %}
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Upload = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
        );

        const Flag = (props) => (
            <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
                <line x1="4" y1="22" x2="4" y2="15"/>
            </svg>
        );

        const GPLaptimeAnalysis = () => {
            const [raceData, setRaceData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [sortBy, setSortBy] = useState('mean');
            const [totalVoltasSessao, setTotalVoltasSessao] = useState(0);  // ← NOVO
            const [filtroCompletou, setFiltroCompletou] = useState(true);   // ← NOVO
            const [minPorcentagem, setMinPorcentagem] = useState(90);       // ← NOVO

            useEffect(() => {
                let mounted = true;
                const retryIntervalMs = 2000;

                const fetchDados = async () => {
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        const sessaoId = urlParams.get('sessao');
                        const url = sessaoId ? `/dados_voltas/${sessaoId}` : '/dados_voltas';
                        const danosUrl = sessaoId ? `/api/danos_carro/${sessaoId}` : null;
                        console.log("Fetching:", url);

                        const fetches = [fetch(url, { cache: 'no-store' })];
                        if (danosUrl) fetches.push(fetch(danosUrl));

                        const [resp, danosResp] = await Promise.all(fetches);

                        if (!resp.ok) {
                            console.error("HTTP error:", resp.status);
                            if (mounted) setRaceData([]);
                            return;
                        }
                        const dados = await resp.json();
                        const danosData = danosResp ? await danosResp.json() : { pilotos: [] };
                        console.log("Dados recebidos:", dados);

                        // Mapa nome → danos
                        const danosPorNome = {};
                        (danosData.pilotos || []).forEach(p => { danosPorNome[p.nome] = p.danos || {}; });
                        
                        // Verifica se é formato novo ou antigo
                        if (dados.pilotos) {
                            // Formato novo: { total_voltas_sessao, pilotos }
                            if (mounted) {
                                setTotalVoltasSessao(dados.total_voltas_sessao || 0);
                                // Injeta danos em cada piloto
                                setRaceData(dados.pilotos.map(p => ({ ...p, danos: danosPorNome[p.nome] || {} })));
                            }
                        } else if (Array.isArray(dados)) {
                            // Formato antigo: array direto
                            const maxVoltas = Math.max(...dados.map(d => d.voltas?.length || 0));
                            if (mounted) {
                                setTotalVoltasSessao(maxVoltas);
                                setRaceData(dados.map(p => ({ ...p, danos: danosPorNome[p.nome] || {} })));
                            }
                        } else {
                            if (mounted) setRaceData([]);
                        }
                    } catch (err) {
                        console.error("Erro fetch:", err);
                        if (mounted) setRaceData([]);
                    } finally {
                        if (mounted) setIsLoading(false);
                    }
                };

                fetchDados();
                const interval = setInterval(fetchDados, retryIntervalMs);

                return () => {
                    mounted = false;
                    clearInterval(interval);
                };
            }, []);

            const handleFileUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                setIsLoading(true);
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    setRaceData(Array.isArray(data) ? data : [data]);
                } catch (error) {
                    alert('Erro ao ler o arquivo JSON!');
                } finally {
                    setIsLoading(false);
                }
            };

            const processDriverData = (driver) => {
                if (!driver || !driver.voltas || driver.voltas.length === 0) return null;

                const validLaps = driver.voltas.filter(lap => {
                    const tempo = lap.tempo_total;
                    if (!tempo || tempo <= 0) return false;
                    
                    const s1 = lap.setor1 || lap.s1 || 0;
                    const s2 = lap.setor2 || lap.s2 || 0;
                    const s3 = lap.setor3 || lap.s3 || 0;
                    
                    if (s1 === 0 && s2 === 0 && s3 === 0) {
                        return tempo > 30 && tempo < 300;
                    }
                    
                    return s1 >= 10 && s2 >= 10 && s3 >= 10;
                });

                if (validLaps.length === 0) return null;

                const lapTimes = validLaps.map(lap => lap.tempo_total);
                const n = lapTimes.length;
                const meanTime = lapTimes.reduce((a, b) => a + b, 0) / n;
                const bestLap = Math.min(...lapTimes);
                const pitStops = driver.pit_stop || 0;
                const totalVoltasPiloto = driver.voltas.length;

                // Quartis para box plot
                const sortedLaps = [...lapTimes].sort((a, b) => a - b);
                const q1     = sortedLaps[Math.floor(n * 0.25)];
                const median = sortedLaps[Math.floor(n * 0.50)];
                const q3     = sortedLaps[Math.floor(n * 0.75)];
                const iqr    = q3 - q1;

                // CV% (consistência real — desvio padrão amostral / média)
                const variance = n > 1
                    ? lapTimes.reduce((sum, t) => sum + (t - meanTime) ** 2, 0) / (n - 1)
                    : 0;
                const stdDev = Math.sqrt(variance);
                const cvPct  = meanTime > 0 ? (stdDev / meanTime) * 100 : 0;
                const consistency = Math.max(0, Math.min(100, 100 - cvPct));

                return {
                    nome: driver.nome || "Desconhecido",
                    numero: driver.numero,
                    tyres: driver.tyres,
                    position: driver.posicao || driver.position || 0,
                    lapTimes,
                    meanTime,
                    bestLap,
                    pitStops,
                    safetyCarLaps: 0,
                    validLapsCount: validLaps.length,
                    totalVoltasPiloto,
                    q1, median, q3, iqr,
                    stdDev, cvPct, consistency,
                    danos: driver.danos || {}
                };
            };

            // NOVO: Calcula mínimo de voltas para ser considerado "completou"
            const minVoltasParaCompletar = Math.floor(totalVoltasSessao * (minPorcentagem / 100));

            const processedDrivers = raceData
                .map(processDriverData)
                .filter(d => {
                    if (d === null) return false;
                    if (d.validLapsCount < 1) return false;
                    
                    // NOVO: Filtra por % de conclusão
                    if (filtroCompletou && totalVoltasSessao > 0) {
                        return d.totalVoltasPiloto >= minVoltasParaCompletar;
                    }
                    return true;
                })
                .sort((a, b) => {
                    switch(sortBy) {
                        case 'best': return a.bestLap - b.bestLap;
                        case 'name': return a.nome.localeCompare(b.nome);
                        case 'position': return (a.position || 99) - (b.position || 99);
                        default: return a.meanTime - b.meanTime;
                    }
                });

            const formatTime = (seconds) => {
                if (!seconds || seconds <= 0) return "--:--.---";
                const mins = Math.floor(seconds / 60);
                const secs = (seconds % 60).toFixed(3);
                return `${mins}:${secs.padStart(6, '0')}`;
            };

            const getDriverInitials = (name) => {
                if (!name) return "???";
                const parts = name.split(' ').filter(p => p.length > 0);
                if (parts.length >= 2) {
                    return parts.slice(-2).map(p => p.substring(0, 3).toUpperCase()).join('');
                }
                return name.substring(0, 6).toUpperCase();
            };

            const colors = [
                '#FF6B35', '#004E89', '#1A936F', '#C1666B', '#48A9A6',
                '#E63946', '#457B9D', '#2A9D8F', '#E76F51', '#264653',
                '#F4A261', '#8338EC', '#3A86FF', '#FB5607', '#FFBE0B'
            ];

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-gray-900 flex items-center justify-center">
                        <div className="text-center text-white">
                            <div className="text-6xl mb-4 animate-bounce">🏎️</div>
                            <h2 className="text-3xl font-bold">Carregando dados...</h2>
                        </div>
                    </div>
                );
            }

            if (processedDrivers.length === 0) {
                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center p-8">
                        <div className="bg-white rounded-lg p-12 max-w-2xl text-center shadow-2xl">
                            <Flag className="text-red-500 mx-auto mb-6" size={64} />
                            <h1 className="text-5xl font-bold text-gray-800 mb-6">GP 2025 🏁</h1>
                            <p className="text-xl text-gray-600 mb-8">Nenhum dado de volta encontrado</p>
                            
                            <label className="cursor-pointer">
                                <div className="bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold py-4 px-8 rounded-lg inline-flex items-center gap-3 transition-all transform hover:scale-105">
                                    <Upload size={24} />
                                    Selecionar Arquivo JSON
                                </div>
                                <input type="file" accept=".json" onChange={handleFileUpload} className="hidden" />
                            </label>
                            
                            <div className="mt-6">
                                <a href="/" className="text-blue-600 hover:underline">← Voltar ao Histórico</a>
                            </div>
                        </div>
                    </div>
                );
            }

            const allLapTimes = processedDrivers.flatMap(d => d.lapTimes);
            const minTime = Math.min(...allLapTimes);
            const maxTime = Math.max(...allLapTimes);
            const yMin = Math.floor((minTime - 2) / 5) * 5;
            const yMax = Math.ceil((maxTime + 2) / 5) * 5;
            const chartHeight = 500;

            const getYPosition = (time) => {
                return chartHeight - ((time - yMin) / (yMax - yMin)) * chartHeight;
            };

            return (
                <div className="min-h-screen bg-gray-100 p-4 md:p-8">
                    <div className="max-w-[1600px] mx-auto">
                        <div className="bg-white rounded-lg shadow-lg p-4 md:p-6 mb-6">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div>
                                    <h1 className="text-2xl md:text-4xl font-bold text-gray-800 mb-2">
                                        Análise de Voltas 🏁
                                    </h1>
                                    <p className="text-sm md:text-base text-gray-600">
                                        {processedDrivers.length} pilotos - Ordenado por {
                                            sortBy === 'mean' ? 'média' :
                                            sortBy === 'best' ? 'melhor volta' :
                                            sortBy === 'position' ? 'posição' : 'nome'
                                        }
                                    </p>
                                </div>
                                <div className="flex gap-2 md:gap-4 items-center flex-wrap">
                                    <a href="/" className="bg-gray-600 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg">
                                        ← Histórico
                                    </a>
                                    <select
                                        value={sortBy}
                                        onChange={(e) => setSortBy(e.target.value)}
                                        className="px-3 py-2 rounded-lg border-2 border-gray-300 font-semibold bg-white text-sm"
                                    >
                                        <option value="mean">Ordenar: Média</option>
                                        <option value="best">Ordenar: Melhor</option>
                                        <option value="position">Ordenar: Posição</option>
                                        <option value="name">Ordenar: Nome</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-lg shadow-lg p-4 md:p-6 overflow-x-auto">
                            <div className="relative" style={{ minWidth: '800px', height: chartHeight + 110 }}>
                                <div className="absolute left-0 top-0 bottom-20 w-20 flex flex-col justify-between text-xs text-gray-600">
                                    {Array.from({ length: 6 }, (_, i) => {
                                        const time = yMax - (i * (yMax - yMin) / 5);
                                        return <div key={i} className="text-right pr-2">{formatTime(time)}</div>;
                                    })}
                                </div>

                                <div className="absolute left-20 right-0 top-0 bottom-20">
                                    {Array.from({ length: 6 }, (_, i) => (
                                        <div key={i} className="absolute w-full border-t border-gray-200" style={{ top: `${(i / 5) * 100}%` }} />
                                    ))}

                                    <div className="flex h-full">
                                        {processedDrivers.map((driver, driverIdx) => {
                                            const color = colors[driverIdx % colors.length];
                                            const columnWidth = 100 / processedDrivers.length;

                                            return (
                                                <div key={driver.nome} className="relative" style={{ width: `${columnWidth}%` }}>
                                                    <div
                                                        className="absolute top-0 bottom-0 left-[10%] right-[10%] opacity-20"
                                                        style={{ 
                                                            backgroundColor: color,
                                                            top: `${getYPosition(driver.q3)}px`,  
                                                            bottom: `${chartHeight - getYPosition(driver.q1)}px` 
                                                        }}
                                                    />
                                                    <div className="absolute left-[5%] right-[5%] h-[3px]" style={{ backgroundColor: color, top: `${getYPosition(driver.median)}px` }} />
                                                    {driver.lapTimes.map((lapTime, lapIdx) => {
                                                        const isOutlier = lapTime > (driver.q3 + 1.5 * driver.iqr) || lapTime < (driver.q1 - 1.5 * driver.iqr);
                                                        return (
                                                            <div
                                                                key={lapIdx}
                                                                className="absolute rounded-full transition-all hover:scale-150 cursor-pointer"
                                                                style={{
                                                                    backgroundColor: color,
                                                                    width: isOutlier ? '3px' : '6px',
                                                                    height: isOutlier ? '3px' : '6px',
                                                                    left: `${30 + (lapIdx * (40 / driver.lapTimes.length))}%`,
                                                                    top: `${getYPosition(lapTime) - 3}px`,
                                                                    opacity: isOutlier ? 0.3 : 0.7
                                                                }}
                                                                title={`Volta ${lapIdx + 1}: ${formatTime(lapTime)}`}
                                                            />
                                                        );
                                                    })}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="absolute left-20 right-0 bottom-0 flex border-t-2 border-gray-300" style={{height:'90px'}}>
                                    {(() => {
                                        // Melhor tempo médio da sessão (para calcular segundos perdidos)
                                        const melhorMedia = Math.min(...processedDrivers.map(d => d.meanTime || 9999));
                                        return processedDrivers.map((driver, idx) => {
                                            const color = colors[idx % colors.length];
                                            const perdeu = driver.meanTime - melhorMedia; // s a mais que o mais rápido
                                            const perdeuStr = perdeu < 0.001
                                                ? '—'
                                                : `+${perdeu.toFixed(3)}s`;

                                            const d = driver.danos || {};
                                            const tot = d.total || 0;
                                            const temDano = tot >= 1;
                                            const corDano = d.nivel === 'vermelho' ? '#e10600'
                                                          : d.nivel === 'amarelo'  ? '#f59e0b'
                                                          : '#22c55e';
                                            const partesDanadas = [];
                                            if ((d.asa_esquerda||0)>5) partesDanadas.push(`Asa E ${d.asa_esquerda.toFixed(0)}%`);
                                            if ((d.asa_direita||0)>5)  partesDanadas.push(`Asa D ${d.asa_direita.toFixed(0)}%`);
                                            if ((d.asa_traseira||0)>5) partesDanadas.push(`Asa T ${d.asa_traseira.toFixed(0)}%`);
                                            if ((d.assoalho||0)>5)    partesDanadas.push(`Assoalho ${d.assoalho.toFixed(0)}%`);
                                            if ((d.difusor||0)>5)     partesDanadas.push(`Difusor ${d.difusor.toFixed(0)}%`);
                                            if ((d.sidepods||0)>5)    partesDanadas.push(`Sidepod ${d.sidepods.toFixed(0)}%`);

                                            return (
                                                <div key={driver.nome} className="flex flex-col items-center justify-center text-center px-1" style={{ width: `${100 / processedDrivers.length}%` }}>
                                                    {/* bolinha de cor */}
                                                    <div className="w-2 h-2 rounded-full mb-1" style={{ backgroundColor: color }} />
                                                    {/* iniciais */}
                                                    <div className="text-xs font-bold" style={{ color }}>{getDriverInitials(driver.nome)}</div>
                                                    {/* média */}
                                                    <div className="text-xs text-gray-700 font-bold">{formatTime(driver.meanTime)}</div>
                                                    {/* segundos perdidos vs líder */}
                                                    <div className="text-[9px] font-semibold" style={{ color: perdeu < 0.001 ? '#22c55e' : '#e10600' }}
                                                         title="Segundos perdidos por volta vs mais rápido">
                                                        {perdeuStr}
                                                    </div>
                                                    {/* voltas */}
                                                    <div className="text-[9px] text-gray-400">{driver.validLapsCount}v</div>
                                                    {/* ícone de dano */}
                                                    {temDano && (
                                                        <div
                                                            title={partesDanadas.length ? partesDanadas.join(' | ') : `Dano: ${tot.toFixed(0)}%`}
                                                            style={{
                                                                display:'inline-flex', alignItems:'center', gap:'2px',
                                                                padding:'1px 4px', borderRadius:'3px', marginTop:'2px',
                                                                background: corDano + '22', border:`1px solid ${corDano}`,
                                                                fontSize:'8px', fontWeight:800, color: corDano,
                                                                cursor:'help', userSelect:'none', lineHeight:1.2
                                                            }}>
                                                            🔧{tot.toFixed(0)}%
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        });
                                    })()}
                                </div>
                            </div>
                        </div>

                        <div className="mt-6 bg-white rounded-lg shadow-lg p-4">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs md:text-sm">
                                {processedDrivers.map((driver, idx) => (
                                    <div key={driver.nome} className="flex items-center gap-2">
                                        <div className="w-4 h-4 rounded-full flex-shrink-0" style={{ backgroundColor: colors[idx % colors.length] }} />
                                        <span className="font-semibold">{getDriverInitials(driver.nome)}</span>
                                        <span className="text-gray-600 truncate">- {driver.nome}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function renderApp() {
            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<GPLaptimeAnalysis />);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderApp);
        } else {
            renderApp();
        }
    </script>
    {% endraw %}

<div id="insta-btn">
  <div id="insta-formats">
    <button class="insta-fmt-btn" onclick="instaCap(1080,1080,'quadrado')">
      <div class="insta-fmt-icon">1:1</div>
      Quadrado · 1080×1080
    </button>
    <button class="insta-fmt-btn" onclick="instaCap(1080,1350,'retrato')">
      <div class="insta-fmt-icon" style="width:24px;height:28px;">4:5</div>
      Retrato · 1080×1350
    </button>
    <button class="insta-fmt-btn" onclick="instaCap(1080,566,'paisagem')">
      <div class="insta-fmt-icon" style="width:32px;height:20px;">1.9:1</div>
      Paisagem · 1080×566
    </button>
  </div>
  <button id="insta-main-btn" onclick="document.getElementById('insta-formats').classList.toggle('open')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
    </svg>
    INSTA
  </button>
</div>

<div id="insta-overlay">
  <div id="insta-spinner"></div>
  <div id="insta-overlay-msg">Gerando imagem...</div>
</div>

<script>
(function() {
  // fecha o menu ao clicar fora
  document.addEventListener('click', function(e) {
    const btn = document.getElementById('insta-btn');
    if (btn && !btn.contains(e.target)) {
      document.getElementById('insta-formats').classList.remove('open');
    }
  });
})();

async function instaCap(outW, outH, label) {
  document.getElementById('insta-formats').classList.remove('open');
  const overlay = document.getElementById('insta-overlay');
  const msg     = document.getElementById('insta-overlay-msg');
  overlay.classList.add('show');
  msg.textContent = 'Capturando tela...';

  // esconde o botão durante a captura
  const fab = document.getElementById('insta-btn');
  fab.style.display = 'none';

  try {
    msg.textContent = 'Renderizando...';
    // ── Escala de captura: usa devicePixelRatio * 3 (mínimo 4)
    // Captura em altíssima resolução antes de comprimir para o formato Instagram
    const captureScale = Math.max(4, window.devicePixelRatio * 3);

    const canvas = await html2canvas(document.body, {
      useCORS: true,
      allowTaint: true,
      scale: captureScale,
      backgroundColor: getComputedStyle(document.body).backgroundColor || '#07080f',
      logging: false,
      removeContainer: true,
      imageTimeout: 0,
      // renderiza fontes com antialiasing máximo
      letterRendering: true,
    });

    msg.textContent = 'Formatando para Instagram...';

    // Canvas de saída em resolução 2x para Instagram (2160×2160 etc.)
    // O Instagram aceita e exibe em qualidade máxima
    const pixelRatio = 2;
    const out = document.createElement('canvas');
    out.width  = outW * pixelRatio;
    out.height = outH * pixelRatio;
    const ctx = out.getContext('2d');
    ctx.imageSmoothingEnabled  = true;
    ctx.imageSmoothingQuality  = 'high';

    // fundo
    ctx.fillStyle = getComputedStyle(document.body).backgroundColor || '#07080f';
    ctx.fillRect(0, 0, out.width, out.height);

    // calcula posição centralizada mantendo proporção
    const srcW = canvas.width;
    const srcH = canvas.height;
    const fit  = Math.min((out.width * 0.96) / srcW, (out.height * 0.96) / srcH);
    const dw   = srcW * fit;
    const dh   = srcH * fit;
    const dx   = (out.width  - dw) / 2;
    const dy   = (out.height - dh) / 2;

    ctx.drawImage(canvas, dx, dy, dw, dh);

    // watermark sutil
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('F1 Telemetry', outW - 14, outH - 10);

    msg.textContent = 'Salvando...';
    const link = document.createElement('a');
    const ts   = new Date().toISOString().slice(0,19).replace(/[:T]/g, '-');
    link.download = `f1-${label}-${ts}.png`;
    link.href = out.toDataURL('image/png');  // PNG é lossless, qualidade máxima
    link.click();

    msg.textContent = '✓ Salvo!';
    await new Promise(r => setTimeout(r, 800));
  } catch(err) {
    console.error(err);
    msg.textContent = 'Erro: ' + err.message;
    await new Promise(r => setTimeout(r, 2000));
  }

  fab.style.display = 'flex';
  overlay.classList.remove('show');
}
</script>
